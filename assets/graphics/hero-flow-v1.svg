<svg viewBox="0 0 540 460" xmlns="http://www.w3.org/2000/svg">
  <style>
    .flow-node-bg { fill: #1A2C38; stroke: rgba(255,244,219,0.14); }
    .flow-node-icon { stroke: #93A7B0; }
    .flow-label { font-family: 'Noto Sans', Arial, sans-serif; font-size: 9.5px; font-weight: 500; fill: #93A7B0; letter-spacing: 0.3px; }

    .flow-node { animation: flow-float 6s cubic-bezier(0.4,0,0.2,1) infinite; transform-box: fill-box; transform-origin: center; }
    .flow-node:nth-of-type(2) { animation-delay: -1.4s; }
    .flow-node:nth-of-type(3) { animation-delay: -3s; }
    .flow-node:nth-of-type(4) { animation-delay: -4.4s; }
    @keyframes flow-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    .flow-path {
      fill: none; stroke: #3D6679; stroke-width: 1.5; stroke-linecap: round;
      stroke-dasharray: 6 6; opacity: 0.4; animation: flow-dash 9s linear infinite;
    }
    @keyframes flow-dash { to { stroke-dashoffset: -48; } }

    .flow-path-main {
      fill: none; stroke: #E6B45D; stroke-width: 2.25; stroke-linecap: round;
      stroke-dasharray: 420; stroke-dashoffset: 420;
      animation: flow-draw 2.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    @keyframes flow-draw { to { stroke-dashoffset: 0; } }

    .flow-hub-ring {
      fill: none; stroke: #E6B45D; stroke-width: 1; opacity: 0.35;
      transform-box: fill-box; transform-origin: center;
      animation: flow-pulse 5.5s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes flow-pulse {
      0% { transform: scale(1); opacity: 0.35; }
      60% { transform: scale(1.12); opacity: 0; }
      100% { transform: scale(1); opacity: 0; }
    }
    .flow-hub { fill: #8E3522; }
  </style>

  <!-- scattered tool nodes -->
  <g class="flow-node">
    <rect class="flow-node-bg" x="18" y="40" width="86" height="60" rx="10"/>
    <path class="flow-node-icon" d="M40 60h42M40 72h30" stroke-width="1.6" stroke-linecap="round"/>
    <text class="flow-label" x="61" y="118" text-anchor="middle">Leads</text>
  </g>

  <g class="flow-node">
    <rect class="flow-node-bg" x="6" y="200" width="86" height="60" rx="10"/>
    <path class="flow-node-icon" d="M27 222h44v28H27z M27 222l22 16 22-16" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    <text class="flow-label" x="49" y="278" text-anchor="middle">Email</text>
  </g>

  <g class="flow-node">
    <rect class="flow-node-bg" x="30" y="330" width="86" height="60" rx="10"/>
    <rect class="flow-node-icon" x="49" y="348" width="48" height="30" rx="3" fill="none" stroke-width="1.4"/>
    <path class="flow-node-icon" d="M58 348v-8m30 8v-8" stroke-width="1.4" stroke-linecap="round"/>
    <text class="flow-label" x="73" y="408" text-anchor="middle">Scheduling</text>
  </g>

  <!-- meandering dashed lines from chaos toward the hub -->
  <path class="flow-path" d="M104 70 C160 70 170 140 230 190"/>
  <path class="flow-path" d="M92 230 C170 230 190 210 230 200"/>
  <path class="flow-path" d="M116 360 C190 360 195 260 230 212"/>

  <!-- convergence hub -->
  <circle class="flow-hub-ring" cx="238" cy="204" r="20"/>
  <circle class="flow-hub" cx="238" cy="204" r="7"/>

  <!-- single clean stream flowing out to the result -->
  <path class="flow-path-main" d="M245 204 C 330 204 320 130 420 118"/>

  <g class="flow-node">
    <rect class="flow-node-bg" x="404" y="82" width="104" height="72" rx="12"/>
    <circle cx="428" cy="106" r="10" fill="none" stroke="#E6B45D" stroke-width="1.6"/>
    <path d="M423 106l3 3 6-7" stroke="#E6B45D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text class="flow-label" x="456" y="132" text-anchor="middle">One</text>
    <text class="flow-label" x="456" y="144" text-anchor="middle">System</text>
  </g>
</svg>
